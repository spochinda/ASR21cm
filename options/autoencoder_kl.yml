# general settings
name: AutoencoderKL_GAN_13
model_type: VAEModel
num_gpu: auto
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: T21train
    type: VAEDataset
    dataroot_gt: datasets/varying_astro/T21_cubes/
    redshifts: [10,]
    run_id_range: [501, 2400]
    gt_size: 64  # random crop size
    norm: arcsinh

    load_full_dataset: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 12
    dataset_enlarge_ratio: 10
    prefetch_mode: ~

  val:
    name: T21val
    type: VAEDataset
    dataroot_gt: datasets/varying_astro/T21_cubes/
    redshifts: [10,]
    run_id_range: [2401, 2408]
    gt_size: 64
    norm: arcsinh

# network structure
network_g:
  type: AutoencoderKL
  autoencoder_opt:
    double_z: true
    z_channels: 8
    embed_dim: 8
    resolution: 64
    in_channels: 1
    out_ch: 1
    ch: 32
    ch_mult: [1, 2, 4, 4]
    num_res_blocks: 2
    attn_resolutions: [8]
    dropout: 0.0

# PatchGAN discriminator (comment out network_d block to disable GAN training)
network_d:
  type: NLayerDiscriminator3D
  input_nc: 1               # must match network_g out_ch
  ndf: 64                   # base number of discriminator filters
  n_layers: 3               # number of strided downsampling layers
  use_spectral_norm: false  # disabled — R1 gradient penalty handles stability

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  optim_g:
    type: Adam
    lr: !!float 2e-5
    weight_decay: 0
    betas: [0.9, 0.999]

  scheduler:
    type: MultiStepLR
    milestones: [50000, 100000]
    gamma: 1.0 # disable LR decay for now

  total_iter: 180000
  warmup_iter: -1

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean
  dsq_opt:
    type: dsq_loss
    loss_weight: 0.1
  dsq_start: 120000
  kl_weight: !!float 3e-3
  kl_anneal_iters: 0       # 0 disables annealing (full weight from iter 0)
  free_bits: 1.0     # min KL per latent dim (nats); set to 0 to disable
  accum_iter: 1  # accumulate gradients over 4 iters to simulate batch size 4
  grad_clip: 5.0
  ema_decay: 0.999

  # GAN settings (used when network_d is defined)
  disc_start: 70000         # train L1+KL only for nk iters before adding GAN
  net_d_init_iters: 70200   # D trains alone for 200 iters before G sees GAN loss
  disc_factor: 1.0
  disc_loss: hinge
  use_adaptive_weight: true
  disc_weight: 1.0          # adaptive weight further scaled by calculate_adaptive_weight

  # Discriminator feature matching loss
  # Matches intermediate D activations between real and fake — acts as a
  # learned multi-scale perceptual loss without a pretrained feature extractor.
  use_feat_matching: true
  feat_matching_weight: 10.0

  # R1 gradient penalty (Mescheder et al. 2018)
  # Penalises ||grad_x D(x)||^2 on real data; guarantees local GAN convergence.
  # Lazy: fires every r1_interval iters, scaled by r1_interval to compensate.
  use_r1: true
  r1_gamma: 10.0            # regularisation strength (10 is standard)
  r1_interval: 16           # apply every N iters (lazy regularisation)

  # learned log-variance for reconstruction loss (NLL formulation)
  use_logvar: false
  logvar_init: 0.0

  # discriminator optimizer (required when network_d is defined)
  optim_d:
    type: Adam
    lr: !!float 2e-5
    weight_decay: 0
    betas: [0.9, 0.999]

# validation settings
val:
  val_freq: !!float 5000
  save_img: true
  pbar: false

  metrics:
    rmse:
      type: calculate_rmse
      better: lower

# logging settings
logger:
  print_freq: 50
  save_checkpoint_freq: !!float 5000
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
